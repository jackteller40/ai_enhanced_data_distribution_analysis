version: '3.8'

services:
  db:
    image: postgres:16
    container_name: foxi-dating-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: foxi
    ports:
      - "5432:5432"
    volumes:
      - foxi-dating-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  foxi-dating-data: